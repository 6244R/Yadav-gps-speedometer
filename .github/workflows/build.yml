name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Android Project
        run: |
          mkdir -p SpeedometerApp/app/src/main/java/com/speedometer
          mkdir -p SpeedometerApp/app/src/main/res/layout
          mkdir -p SpeedometerApp/app/src/main/res/values
          mkdir -p SpeedometerApp/app/src/main/assets

      - name: Create settings.gradle
        run: |
          cat > SpeedometerApp/settings.gradle << 'EOF'
          pluginManagement {
            repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
            repositories { google(); mavenCentral() }
          }
          rootProject.name = "SpeedometerApp"
          include ':app'
          EOF

      - name: Create build.gradle
        run: |
          cat > SpeedometerApp/app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
            compileSdk 34
            namespace 'com.speedometer'
            defaultConfig {
              applicationId "com.speedometer"
              minSdk 21
              targetSdk 34
              versionCode 1
              versionName "1.0"
            }
          }
          dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

      - name: Build APK
        run: |
          cd SpeedometerApp
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: GPS-Speedometer-APK
          path: SpeedometerApp/app/build/outputs/apk/debug/app-debug.apk
